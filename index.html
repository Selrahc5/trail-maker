<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Trail Maker</title>

	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M20 8 L20 52' stroke='%23555' stroke-width='4' stroke-linecap='round'/><path d='M20 12 L42 18 L42 30 L20 24' fill='%232e7d32'/><circle cx='44' cy='48' r='6' fill='%231565c0'/><path d='M38 54 Q28 42 34 36' stroke='%231565c0' stroke-width='2.5' fill='none' stroke-linecap='round'/></svg>">

	<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

	<style>
		html, body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			font-family: system-ui, -apple-system, sans-serif;
		}

		#map {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
		}

		.header-bar {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			z-index: 500;
			background: linear-gradient(135deg, rgba(40, 95, 55, 0.92), rgba(55, 125, 70, 0.88));
			backdrop-filter: blur(8px);
			padding: 10px 20px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
		}

		.header-bar .app-title {
			color: #fff;
			font-size: 1.3rem;
			font-weight: 600;
			letter-spacing: 0.5px;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.header-bar .app-title i {
			font-size: 1.1rem;
		}

		.toolbar {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.toolbar .btn {
			border: none;
			border-radius: 8px;
			padding: 6px 14px;
			font-size: 0.85rem;
			font-weight: 500;
			transition: all 0.2s ease;
			display: flex;
			align-items: center;
			gap: 5px;
		}

		.toolbar .btn i {
			font-size: 1rem;
		}

		.header-separator {
			width: 1px;
			height: 24px;
			background: rgba(255, 255, 255, 0.3);
		}

		.header-distance {
			color: #fff;
			font-size: 0.85rem;
			font-weight: 600;
			white-space: nowrap;
			display: flex;
			align-items: center;
			gap: 5px;
			padding: 0 4px;
		}

		.header-bar .input-group {
			max-width: 170px;
		}

		.header-bar .input-group-text {
			background: rgba(255, 255, 255, 0.2);
			border: 1px solid rgba(255, 255, 255, 0.25);
			color: #fff;
			font-size: 0.8rem;
			font-weight: 500;
			padding: 4px 8px;
		}

		.header-bar .form-control {
			background: rgba(255, 255, 255, 0.15);
			border: 1px solid rgba(255, 255, 255, 0.25);
			color: #fff;
			font-size: 0.8rem;
			padding: 4px 8px;
		}

		.header-bar .form-control::placeholder {
			color: rgba(255, 255, 255, 0.55);
		}

		.header-bar .form-control:focus {
			background: rgba(255, 255, 255, 0.25);
			border-color: rgba(255, 255, 255, 0.5);
			box-shadow: none;
			color: #fff;
		}

		.btn-tool {
			background: rgba(255, 255, 255, 0.18);
			color: #fff;
		}

		.btn-tool:hover {
			background: rgba(255, 255, 255, 0.3);
			color: #fff;
			transform: translateY(-1px);
		}

		.btn-tool:active {
			transform: translateY(0);
		}

		.btn-save {
			background: rgba(255, 255, 255, 0.92);
			color: #2d6a3e;
		}

		.btn-save:hover {
			background: #fff;
			color: #1e4d2b;
			transform: translateY(-1px);
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
		}

		.btn-save:active {
			transform: translateY(0);
		}

		.btn-clear {
			background: rgba(220, 80, 70, 0.85);
			color: #fff;
		}

		.btn-clear:hover {
			background: rgba(220, 80, 70, 1);
			color: #fff;
			transform: translateY(-1px);
		}

		.btn-clear:active {
			transform: translateY(0);
		}


		.cycle-panel {
			position: absolute;
			top: 70px;
			left: 16px;
			z-index: 500;
			width: 240px;
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			border-radius: 14px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
			overflow: hidden;
		}

		.cycle-panel-header {
			background: linear-gradient(135deg, #1565c0, #1e88e5);
			color: #fff;
			padding: 10px 14px;
			font-size: 0.9rem;
			font-weight: 600;
			display: flex;
			align-items: center;
			gap: 8px;
			cursor: pointer;
			user-select: none;
		}

		.cycle-panel-header:hover {
			filter: brightness(1.05);
		}

		.cycle-panel-header .toggle-icon {
			margin-left: auto;
			transition: transform 0.2s ease;
		}

		.cycle-panel-header .toggle-icon.collapsed {
			transform: rotate(-90deg);
		}

		.cycle-panel-body {
			padding: 12px 14px;
		}

		.cycle-panel-body label {
			color: #555;
			font-weight: 500;
			margin-bottom: 3px;
		}

		.cycle-panel-body .form-control,
		.cycle-panel-body .form-select {
			font-size: 0.85rem;
			border-color: #bbdefb;
		}

		.cycle-panel-body .form-control:focus,
		.cycle-panel-body .form-select:focus {
			border-color: #42a5f5;
			box-shadow: 0 0 0 0.2rem rgba(66, 165, 245, 0.2);
		}

		.btn-generate {
			background: linear-gradient(135deg, #1565c0, #1e88e5);
			color: #fff;
			border: none;
			border-radius: 8px;
			font-weight: 500;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
			transition: all 0.2s ease;
		}

		.btn-generate:hover {
			background: linear-gradient(135deg, #0d47a1, #1565c0);
			color: #fff;
			transform: translateY(-1px);
			box-shadow: 0 2px 8px rgba(21, 101, 192, 0.3);
		}

		.btn-generate:active {
			transform: translateY(0);
		}

		.btn-generate:disabled {
			opacity: 0.7;
			transform: none;
		}

		.btn-shuffle {
			background: rgba(21, 101, 192, 0.1);
			color: #1565c0;
			border: 1px solid #bbdefb;
			border-radius: 8px;
			font-weight: 500;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
			transition: all 0.2s ease;
		}

		.btn-shuffle:hover {
			background: rgba(21, 101, 192, 0.18);
			color: #0d47a1;
			transform: translateY(-1px);
		}

		.btn-shuffle:active {
			transform: translateY(0);
		}

		.cycle-status {
			font-size: 0.78rem;
			color: #777;
		}

		.cycle-status.error {
			color: #c62828;
		}

		.cycle-status.success {
			color: #2e7d32;
		}

		.api-key-link {
			font-size: 0.75rem;
		}

		.spinner-border-sm {
			width: 0.9rem;
			height: 0.9rem;
			border-width: 0.15em;
		}

		@media (max-width: 600px) {
			.header-bar {
				padding: 8px 12px;
			}
			.header-bar .app-title {
				font-size: 1rem;
			}
			.toolbar .btn {
				padding: 5px 10px;
				font-size: 0.78rem;
			}
			.toolbar .btn span {
				display: none;
			}
			.header-distance {
				font-size: 0.78rem;
			}
			.header-bar .input-group {
				max-width: 120px;
			}
			.cycle-panel {
				width: 200px;
				left: 8px;
			}
		}
	</style>

</head>
<body>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>

	<div id="map"></div>

	<div class="header-bar">
		<div class="app-title">
			<i class="bi bi-signpost-split"></i>
			Trail Maker
		</div>
		<div class="toolbar">
			<div class="header-distance">
				<i class="bi bi-signpost-2"></i>
				<span id="distance">0 km</span>
			</div>
			<div class="header-separator"></div>
			<div class="input-group">
				<span class="input-group-text">.gpx</span>
				<input type="text" class="form-control" id="saveFile" placeholder="filename"/>
			</div>
			<div class="header-separator"></div>
			<button type="button" class="btn btn-clear" id="clearTrailButton" title="Clear trail">
				<i class="bi bi-trash3"></i>
				<span>Clear</span>
			</button>
			<button type="button" class="btn btn-tool" id="undoButton" title="Undo">
				<i class="bi bi-arrow-counterclockwise"></i>
				<span>Undo</span>
			</button>
			<button type="button" class="btn btn-tool" id="redoButton" title="Redo">
				<i class="bi bi-arrow-clockwise"></i>
				<span>Redo</span>
			</button>
			<button type="button" class="btn btn-save" id="saveTrailButton" title="Save trail">
				<i class="bi bi-download"></i>
				<span>Save</span>
			</button>
		</div>
	</div>

	<div class="cycle-panel">
		<div class="cycle-panel-header" id="cyclePanelToggle">
			<i class="bi bi-bicycle"></i>
			Cycle Route
			<i class="bi bi-chevron-down toggle-icon" id="toggleIcon"></i>
		</div>
		<div class="cycle-panel-body" id="cyclePanelBody">
			<div class="mb-2">
				<label class="form-label small mb-1">API Key</label>
				<input type="password" class="form-control form-control-sm" id="apiKey" placeholder="OpenRouteService key">
				<a href="https://openrouteservice.org/dev/#/signup" target="_blank" class="api-key-link text-muted">Get a free key</a>
			</div>
			<div class="mb-2">
				<label class="form-label small mb-1">Distance</label>
				<select class="form-select form-select-sm" id="cycleDistance">
					<option value="10000">10 km</option>
					<option value="20000">20 km</option>
					<option value="30000" selected>30 km</option>
					<option value="40000">40 km</option>
					<option value="50000">50 km</option>
					<option value="75000">75 km</option>
					<option value="100000">100 km</option>
				</select>
			</div>
			<button class="btn btn-sm btn-generate w-100" id="generateRoute">
				<i class="bi bi-play-circle"></i> Generate
			</button>
			<button class="btn btn-sm btn-shuffle w-100 mt-1" id="shuffleRoute">
				<i class="bi bi-shuffle"></i> Shuffle
			</button>
			<div class="cycle-status mt-2" id="cycleStatus">Click the map to set a start point, then generate.</div>
		</div>
	</div>


<script type="module">
	import saveGeojson from './modules/geojson.js';

	const map = L.map('map').setView([46.94, 6.73], 10);
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	map.locate({setView: true, maxZoom: 13});

	var geojsonContent = {
		type: "FeatureCollection",
		features: [
			{
				type: "Feature",
				properties: {},
				geometry: {
					coordinates: [],
					type: "LineString",
				},
			},
		],
	};

	var markerArray = [];
	var polylineOption = {color: '#2e7d32', weight: 4, opacity: 0.8};
	var polyline = L.polyline([], polylineOption);
	var totalDistanceMeter = 0.00000;
	var deletedMarkers = [];
	var filename = "trail.gpx";
	var startMarker = null;
	var cyclePolyline = null;
	var cycleSeed = 0;

	const apiKeyInput = document.getElementById('apiKey');
	var savedKey = localStorage.getItem('ors_api_key');
	if (savedKey) apiKeyInput.value = savedKey;
	apiKeyInput.addEventListener('change', () => {
		localStorage.setItem('ors_api_key', apiKeyInput.value);
	});

	const cyclePanelToggle = document.getElementById('cyclePanelToggle');
	const cyclePanelBody = document.getElementById('cyclePanelBody');
	const toggleIcon = document.getElementById('toggleIcon');
	cyclePanelToggle.addEventListener('click', () => {
		var hidden = cyclePanelBody.style.display === 'none';
		cyclePanelBody.style.display = hidden ? 'block' : 'none';
		toggleIcon.classList.toggle('collapsed', !hidden);
	});

	function updateTotalDistance() {
		var distKm = (totalDistanceMeter / 1000).toFixed(2);
		document.getElementById("distance").innerText = distKm + " km";
	}

	function updatePolyline() {
		var newValues = markerArray.map((marker) => marker.getLatLng());
		map.removeLayer(polyline);
		polyline = L.polyline(newValues, polylineOption).addTo(map);

		totalDistanceMeter = 0.00000;
		var previousMarkerLatLng = null;
		if (markerArray.length > 0) {
			previousMarkerLatLng = markerArray[0].getLatLng();
		}
		for (const marker of markerArray) {
			var markerLatLng = marker.getLatLng();
			totalDistanceMeter += previousMarkerLatLng.distanceTo(markerLatLng);
			previousMarkerLatLng = markerLatLng;
		}
		updateTotalDistance();
	}

	function clearTrail() {
		geojsonContent.features[0].geometry.coordinates = [];
		for (let element of markerArray) {
			map.removeLayer(element);
		}
		markerArray = [];
		deletedMarkers = [];
		if (cyclePolyline) {
			map.removeLayer(cyclePolyline);
			cyclePolyline = null;
		}
		map.removeLayer(polyline);
		polyline = L.polyline([], polylineOption);
		totalDistanceMeter = 0;
		updateTotalDistance();
	}

	function onMapClick(e) {
		var coordinates = e.latlng;
		var marker = L.marker(coordinates).addTo(map);
		markerArray.push(marker);
		updatePolyline();
		deletedMarkers = [];
		geojsonContent.features[0].geometry.coordinates.push(
			[coordinates['lng'], coordinates['lat']]);

		startMarker = coordinates;
		setCycleStatus('Start point set. Ready to generate.', '');
	}

	function setCycleStatus(text, type) {
		var el = document.getElementById('cycleStatus');
		el.innerText = text;
		el.className = 'cycle-status mt-2' + (type ? ' ' + type : '');
	}

	async function generateCycleRoute(seed) {
		var apiKey = apiKeyInput.value.trim();
		if (!apiKey) {
			setCycleStatus('Please enter an API key.', 'error');
			return;
		}

		if (!startMarker && markerArray.length === 0) {
			setCycleStatus('Click the map to set a start point first.', 'error');
			return;
		}

		var origin = startMarker || markerArray[markerArray.length - 1].getLatLng();
		var distance = parseInt(document.getElementById('cycleDistance').value);

		var generateBtn = document.getElementById('generateRoute');
		var shuffleBtn = document.getElementById('shuffleRoute');
		generateBtn.disabled = true;
		shuffleBtn.disabled = true;
		generateBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Generating...';
		setCycleStatus('Requesting route from OpenRouteService...', '');

		try {
			var response = await fetch('https://api.openrouteservice.org/v2/directions/cycling-road/geojson', {
				method: 'POST',
				headers: {
					'Authorization': apiKey,
					'Content-Type': 'application/json',
				},
				body: JSON.stringify({
					coordinates: [[origin.lng, origin.lat]],
					options: {
						round_trip: {
							length: distance,
							points: Math.max(3, Math.round(distance / 5000)),
							seed: seed,
						}
					}
				}),
			});

			if (!response.ok) {
				var errorData = await response.json().catch(() => null);
				var msg = errorData?.error?.message || response.statusText;
				throw new Error(msg);
			}

			var data = await response.json();
			var routeCoords = data.features[0].geometry.coordinates;
			var routeDistance = data.features[0].properties.summary.distance;

			clearTrail();

			var latLngs = routeCoords.map(c => [c[1], c[0]]);
			cyclePolyline = L.polyline(latLngs, {
				color: '#1565c0',
				weight: 5,
				opacity: 0.85,
			}).addTo(map);

			geojsonContent.features[0].geometry.coordinates = routeCoords;
			totalDistanceMeter = routeDistance;
			updateTotalDistance();

			map.fitBounds(cyclePolyline.getBounds(), {padding: [60, 60]});

			var distKm = (routeDistance / 1000).toFixed(1);
			setCycleStatus('Route generated: ' + distKm + ' km', 'success');
		} catch (err) {
			setCycleStatus('Error: ' + err.message, 'error');
		} finally {
			generateBtn.disabled = false;
			shuffleBtn.disabled = false;
			generateBtn.innerHTML = '<i class="bi bi-play-circle"></i> Generate';
		}
	}

	document.getElementById('generateRoute').addEventListener('click', () => {
		cycleSeed = 0;
		generateCycleRoute(cycleSeed);
	});

	document.getElementById('shuffleRoute').addEventListener('click', () => {
		cycleSeed = Math.floor(Math.random() * 100000);
		generateCycleRoute(cycleSeed);
	});

	const saveButton = document.querySelector('#saveTrailButton');
	saveButton.addEventListener("click", (event) => {
		var newFilename = document.getElementById("saveFile").value;
		if (newFilename != "") {
			filename = newFilename;
		}
		saveGeojson(geojsonContent, filename);
	});

	const clearButton = document.querySelector('#clearTrailButton');
	clearButton.addEventListener("click", (event) => {
		clearTrail();
		startMarker = null;
		setCycleStatus('Click the map to set a start point, then generate.', '');
	});

	const undoButton = document.querySelector('#undoButton');
	undoButton.addEventListener("click", (event) => {
		if (markerArray.length > 0) {
			var marker = markerArray.pop();
			map.removeLayer(marker);
			deletedMarkers.push(marker);
			geojsonContent.features[0].geometry.coordinates.pop();
			updatePolyline();
		}
	});

	const redoButton = document.querySelector('#redoButton');
	redoButton.addEventListener("click", (event) => {
		if (deletedMarkers.length > 0) {
			var marker = deletedMarkers.pop().addTo(map);
			geojsonContent.features[0].geometry.coordinates.push(
				[marker.getLatLng()['lng'], marker.getLatLng()['lat']]);
			markerArray.push(marker);
			updatePolyline();
		}
	});

	map.on('click', onMapClick);

</script>

</body>
</html>
