<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Trail Maker</title>

	<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

	<style>
		html, body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			font-family: system-ui, -apple-system, sans-serif;
		}

		#map {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
		}

		.header-bar {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			z-index: 500;
			background: linear-gradient(135deg, rgba(40, 95, 55, 0.92), rgba(55, 125, 70, 0.88));
			backdrop-filter: blur(8px);
			padding: 10px 20px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
		}

		.header-bar .app-title {
			color: #fff;
			font-size: 1.3rem;
			font-weight: 600;
			letter-spacing: 0.5px;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.header-bar .app-title i {
			font-size: 1.1rem;
		}

		.toolbar {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.toolbar .btn {
			border: none;
			border-radius: 8px;
			padding: 6px 14px;
			font-size: 0.85rem;
			font-weight: 500;
			transition: all 0.2s ease;
			display: flex;
			align-items: center;
			gap: 5px;
		}

		.toolbar .btn i {
			font-size: 1rem;
		}

		.btn-tool {
			background: rgba(255, 255, 255, 0.18);
			color: #fff;
		}

		.btn-tool:hover {
			background: rgba(255, 255, 255, 0.3);
			color: #fff;
			transform: translateY(-1px);
		}

		.btn-tool:active {
			transform: translateY(0);
		}

		.btn-save {
			background: rgba(255, 255, 255, 0.92);
			color: #2d6a3e;
		}

		.btn-save:hover {
			background: #fff;
			color: #1e4d2b;
			transform: translateY(-1px);
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
		}

		.btn-save:active {
			transform: translateY(0);
		}

		.btn-clear {
			background: rgba(220, 80, 70, 0.85);
			color: #fff;
		}

		.btn-clear:hover {
			background: rgba(220, 80, 70, 1);
			color: #fff;
			transform: translateY(-1px);
		}

		.btn-clear:active {
			transform: translateY(0);
		}

		.bottom-panel {
			position: absolute;
			bottom: 24px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 500;
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			border-radius: 14px;
			padding: 12px 20px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
			display: flex;
			align-items: center;
			gap: 16px;
			min-width: 380px;
		}

		.bottom-panel .input-group {
			max-width: 220px;
		}

		.bottom-panel .input-group-text {
			background: #e8f5e9;
			border-color: #c8e6c9;
			color: #2e7d32;
			font-size: 0.85rem;
			font-weight: 500;
		}

		.bottom-panel .form-control {
			border-color: #c8e6c9;
			font-size: 0.85rem;
		}

		.bottom-panel .form-control:focus {
			border-color: #66bb6a;
			box-shadow: 0 0 0 0.2rem rgba(76, 175, 80, 0.2);
		}

		.distance-badge {
			background: linear-gradient(135deg, #2e7d32, #43a047);
			color: #fff;
			padding: 6px 14px;
			border-radius: 20px;
			font-size: 0.85rem;
			font-weight: 600;
			white-space: nowrap;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.distance-badge i {
			font-size: 0.9rem;
		}

		.separator {
			width: 1px;
			height: 28px;
			background: #ddd;
		}

		@media (max-width: 600px) {
			.header-bar {
				padding: 8px 12px;
			}
			.header-bar .app-title {
				font-size: 1rem;
			}
			.toolbar .btn {
				padding: 5px 10px;
				font-size: 0.78rem;
			}
			.toolbar .btn span {
				display: none;
			}
			.bottom-panel {
				min-width: auto;
				width: calc(100% - 32px);
				flex-wrap: wrap;
				justify-content: center;
				gap: 10px;
				bottom: 16px;
				padding: 10px 14px;
			}
			.bottom-panel .input-group {
				max-width: 100%;
			}
		}
	</style>

</head>
<body>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>

	<div id="map"></div>

	<div class="header-bar">
		<div class="app-title">
			<i class="bi bi-signpost-split"></i>
			Trail Maker
		</div>
		<div class="toolbar">
			<button type="button" class="btn btn-clear" id="clearTrailButton" title="Clear trail">
				<i class="bi bi-trash3"></i>
				<span>Clear</span>
			</button>
			<button type="button" class="btn btn-tool" id="undoButton" title="Undo">
				<i class="bi bi-arrow-counterclockwise"></i>
				<span>Undo</span>
			</button>
			<button type="button" class="btn btn-tool" id="redoButton" title="Redo">
				<i class="bi bi-arrow-clockwise"></i>
				<span>Redo</span>
			</button>
			<button type="button" class="btn btn-save" id="saveTrailButton" title="Save trail">
				<i class="bi bi-download"></i>
				<span>Save</span>
			</button>
		</div>
	</div>

	<div class="bottom-panel">
		<div class="distance-badge">
			<i class="bi bi-signpost-2"></i>
			<span id="distance">0 km</span>
		</div>
		<div class="separator"></div>
		<div class="input-group">
			<span class="input-group-text">.gpx</span>
			<input type="text" class="form-control" id="saveFile" placeholder="filename"/>
		</div>
	</div>

<script type="module">
	import saveGeojson from './modules/geojson.js';

	const map = L.map('map').setView([46.94, 6.73], 10);
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	var geojsonContent = {
		type: "FeatureCollection",
		features: [
			{
				type: "Feature",
				properties: {},
				geometry: {
					coordinates: [],
					type: "LineString",
				},
			},
		],
	};

	var markerArray = [];
	var polylineOption = {color: '#2e7d32', weight: 4, opacity: 0.8};
	var polyline = L.polyline([], polylineOption);
	var totalDistanceMeter = 0.00000;
	var deletedMarkers = [];
	var filename = "trail.gpx";

	function updateTotalDistance() {
		var distKm = (totalDistanceMeter / 1000).toFixed(2);
		document.getElementById("distance").innerText = distKm + " km";
	}

	function updatePolyline() {
		var newValues = markerArray.map((marker) => marker.getLatLng());
		map.removeLayer(polyline);
		polyline = L.polyline(newValues, polylineOption).addTo(map);

		totalDistanceMeter = 0.00000;
		var previousMarkerLatLng = null;
		if (markerArray.length > 0) {
			previousMarkerLatLng = markerArray[0].getLatLng();
		}
		for (const marker of markerArray) {
			var markerLatLng = marker.getLatLng();
			totalDistanceMeter += previousMarkerLatLng.distanceTo(markerLatLng);
			previousMarkerLatLng = markerLatLng;
		}
		updateTotalDistance();
	}

	function onMapClick(e) {
		var coordinates = e.latlng;
		var marker = L.marker(coordinates).addTo(map);
		markerArray.push(marker);
		updatePolyline();
		deletedMarkers = [];
		geojsonContent.features[0].geometry.coordinates.push(
			[coordinates['lng'], coordinates['lat']]);
	}

	const saveButton = document.querySelector('#saveTrailButton');
	saveButton.addEventListener("click", (event) => {
		var newFilename = document.getElementById("saveFile").value;
		if (newFilename != "") {
			filename = newFilename;
		}
		saveGeojson(geojsonContent, filename);
	});

	const clearButton = document.querySelector('#clearTrailButton');
	clearButton.addEventListener("click", (event) => {
		geojsonContent.features[0].geometry.coordinates = [];
		for (let element of markerArray) {
			map.removeLayer(element);
			deletedMarkers.unshift(element);
		}
		markerArray = [];
		updatePolyline();
	});

	const undoButton = document.querySelector('#undoButton');
	undoButton.addEventListener("click", (event) => {
		if (markerArray.length > 0) {
			var marker = markerArray.pop();
			map.removeLayer(marker);
			deletedMarkers.push(marker);
			geojsonContent.features[0].geometry.coordinates.pop();
			updatePolyline();
		}
	});

	const redoButton = document.querySelector('#redoButton');
	redoButton.addEventListener("click", (event) => {
		if (deletedMarkers.length > 0) {
			var marker = deletedMarkers.pop().addTo(map);
			geojsonContent.features[0].geometry.coordinates.push(
				[marker.getLatLng()['lng'], marker.getLatLng()['lat']]);
			markerArray.push(marker);
			updatePolyline();
		}
	});

	map.on('click', onMapClick);

</script>

</body>
</html>
